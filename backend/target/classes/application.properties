# =============================================
# YouTube Downloader - Application Configuration
# =============================================

# Puerto del servidor
server.port=8080

# Tamaño máximo de respuesta (archivos grandes)
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
server.tomcat.connection-timeout=600000

# Ruta donde se guardarán temporalmente los archivos descargados
app.download.dir=./downloads

# Timeout para procesos externos (yt-dlp, ffmpeg) en segundos
app.process.timeout=600

# Logging
logging.level.com.ytdownloader=DEBUG
logging.level.org.springframework.web=INFO
